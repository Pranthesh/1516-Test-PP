<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Site Map – 1516</title>

  <style>
    body {
        font-family: Arial, sans-serif;
        background: #f8f9fa;
        margin: 0;
        padding: 0;
        color: #333;
    }

    .container {
        max-width: 900px;
        margin: 50px auto;
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 20px;
        color: #111;
    }

    p {
        text-align: center;
        font-size: 16px;
        margin-bottom: 30px;
        color: #666;
    }

    ul {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    ul li {
        margin: 12px 0;
        padding: 14px 18px;
        background: #f1f3f5;
        border-radius: 8px;
        transition: 0.3s;
    }

    ul li:hover {
        background: #e9ecef;
        transform: translateX(5px);
    }

    ul li a {
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        color: #007bff;
        display: block;
    }

    ul li a:hover {
        color: #0056b3;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Site Map</h1>
    <p>Quick links to all important pages of our website.</p>

    <ul>
      <li><a href="/zh/">Home</a></li>
      <li><a href="/zh/about-us">About Us</a></li>
      <li><a href="/zh/our-menu">Our Menu</a></li>
      <li><a href="/zh/find-us">Find Us</a></li>
      <li><a href="/zh/privacy-policy">Privacy Policy</a></li>
      <li><a href="/zh/terms-conditions">Terms & Conditions</a></li>
    </ul>
  </div>
</body>
</html>
